name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  # Argon2id (RFC 9106) lands in OpenSSL 3.2 — Ubuntu 24.04 still ships
  # 3.0, so we build a recent OpenSSL from source on Linux. macOS uses
  # Homebrew's openssl@3 which is 3.6.x and already has the macros.
  OPENSSL_VERSION: "3.4.0"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14            # Apple Silicon (M1+)
            target: macos-arm64
          #- os: macos-13           # Intel Mac
          #  target: macos-x86_64
          - os: ubuntu-24.04        # Linux x86_64
            target: linux-x86_64
            openssl_config: linux-x86_64
          - os: ubuntu-24.04-arm    # Linux arm64
            target: linux-arm64
            openssl_config: linux-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          # Full history + tags so the Makefile's `git describe --tags`
          # rule can resolve the release tag (e.g. v0.7.0) and bake it
          # into the binary's version banner. The default shallow clone
          # would leave git describe with only the commit hash.
          fetch-depth: 0

      - name: Install dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install openssl@3 readline sqlite utf8proc re2 dylibbundler

      - name: Cache OpenSSL ${{ env.OPENSSL_VERSION }} (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        id: openssl-cache
        uses: actions/cache@v4
        with:
          path: ~/openssl-install
          # Key on version + OS + arch so a bump (or a runner image
          # update that changes the toolchain) cleanly invalidates.
          key: openssl-${{ env.OPENSSL_VERSION }}-${{ runner.os }}-${{ runner.arch }}-v1

      - name: Build OpenSSL ${{ env.OPENSSL_VERSION }} from source (Linux, cache miss only)
        if: startsWith(matrix.os, 'ubuntu') && steps.openssl-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          cd /tmp
          URL="https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz"
          curl -fsSL "$URL" -o openssl.tar.gz
          curl -fsSL "$URL.sha256" -o openssl.tar.gz.sha256
          EXPECTED=$(awk '{print $1}' openssl.tar.gz.sha256)
          ACTUAL=$(sha256sum openssl.tar.gz | awk '{print $1}')
          test "$EXPECTED" = "$ACTUAL"
          tar xf openssl.tar.gz
          cd "openssl-${OPENSSL_VERSION}"
          ./Configure ${{ matrix.openssl_config }} \
              --prefix=$HOME/openssl-install \
              --openssldir=$HOME/openssl-install/ssl \
              no-tests no-docs shared
          make -j$(nproc)
          make install_sw

      - name: Configure environment for custom OpenSSL (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          PREFIX=$HOME/openssl-install
          echo "CPATH=$PREFIX/include:${CPATH:-}" >> $GITHUB_ENV
          echo "LIBRARY_PATH=$PREFIX/lib64:$PREFIX/lib:${LIBRARY_PATH:-}" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$PREFIX/lib64:$PREFIX/lib:${LD_LIBRARY_PATH:-}" >> $GITHUB_ENV
          export LD_LIBRARY_PATH=$PREFIX/lib64:$PREFIX/lib:${LD_LIBRARY_PATH:-}
          $PREFIX/bin/openssl version

      - name: Install other dependencies (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        # libssl-dev intentionally omitted — we use the custom-built
        # OpenSSL above for Argon2id support. The rest come from apt.
        run: |
          sudo apt-get update
          sudo apt-get install -y libreadline-dev libsqlite3-dev libutf8proc-dev libre2-dev patchelf

      - name: Build
        # Bake PRAIA_LIBDIR=/usr/local/lib/praia into the binary so that
        # `praia --include-path` resolves to the headers we ship below,
        # which lets users build native plugins without a Praia source checkout.
        # OPT=-O2 -g -DNDEBUG turns on optimization while keeping debug
        # info for symbolicated crash reports — local dev builds keep
        # their faster-incremental -g default.
        run: |
          make clean
          make OPT='-O2 -g -DNDEBUG' EXTRA_CXXFLAGS='-DPRAIA_LIBDIR="\"/usr/local/lib/praia\""'

      - name: Run tests
        run: make test

      - name: Stage files
        # Lay out dist/ to mirror the install layout: top-level praia binary
        # (gets installed to bin/praia), and lib/praia/{grains,sand,include}
        # for everything else. Bundling steps below add lib/praia/dylibs (macOS)
        # or lib/praia/lib (Linux). The binary's RPATH/load-paths assume the
        # post-install relative position, where binary is at bin/praia and
        # libs live at ../lib/praia/{dylibs,lib}/.
        # Headers shipped match the list in `make install` so plugin authors
        # can build against /usr/local/lib/praia/include/ without a source checkout.
        run: |
          mkdir -p dist/lib/praia
          cp praia dist/
          cp -R grains dist/lib/praia/grains
          # Sand is now a regular global grain under ext_grains/sand/.
          mkdir -p dist/lib/praia/ext_grains/sand
          cp sand/main.praia dist/lib/praia/ext_grains/sand/
          cp sand/grain.yaml dist/lib/praia/ext_grains/sand/
          cp -R sand/grains dist/lib/praia/ext_grains/sand/grains
          # Layout-aware `sand` wrapper. Handles both supported shapes:
          #   • Tarball extracted in place: sand and praia are siblings,
          #     lib/praia/ext_grains/sand/main.praia is at
          #     $DIR/lib/praia/ext_grains/sand/.
          #   • make-install / sudo-cp to /usr/local: binary in bin/,
          #     lib/praia/ext_grains/sand/main.praia is at
          #     $DIR/../lib/praia/ext_grains/sand/.
          # The sentinel comment ("# sand-managed wrapper for sand")
          # is what lets sand recognize this wrapper as its own on a
          # later self-update (sand/grains/bin.praia checks line 2).
          # Layout-aware probing uses double-quoted shell expansions
          # rather than single-quoted absolute paths (it has to —
          # the path is computed at run time, not bake time). Sand's
          # bin.wrapperContent uses single-quoted absolutes; a later
          # `sand install -g sand@<ver>` replaces this layout-aware
          # form with the absolute single-quoted form.
          cat > dist/sand <<'SAND_EOF'
          #!/bin/sh
          # sand-managed wrapper for sand
          SCRIPT_DIR=$(cd "$(dirname "$0")" && pwd)
          for candidate in "$SCRIPT_DIR/lib/praia/ext_grains/sand" "$SCRIPT_DIR/../lib/praia/ext_grains/sand"; do
              if [ -f "$candidate/main.praia" ]; then
                  exec "$SCRIPT_DIR/praia" "$candidate/main.praia" "$@"
              fi
          done
          echo "sand: lib/praia/ext_grains/sand/main.praia not found near $SCRIPT_DIR" >&2
          exit 1
          SAND_EOF
          chmod 755 dist/sand
          mkdir -p dist/lib/praia/include
          cp src/praia_plugin.h \
             src/value.h \
             src/builtins.h \
             src/interpreter.h \
             src/gc_heap.h \
             src/environment.h \
             src/ast.h \
             src/token.h \
             src/fiber.h \
             src/signal_state.h \
             dist/lib/praia/include/
          cp README.md LICENSE dist/ 2>/dev/null || true

      - name: Bundle dylibs (macOS)
        if: startsWith(matrix.os, 'macos')
        # The binary links against homebrew dylibs (openssl, re2, utf8proc, abseil
        # via re2). Without bundling, users hit "Library not loaded" unless they
        # have the same homebrew packages installed at the same paths. dylibbundler
        # copies every non-system dylib (recursively) into dist/lib/praia/dylibs/
        # and rewrites the binary + each bundled dylib's load paths to use
        # @executable_path/../lib/praia/dylibs/, so the install layout becomes
        # self-contained: bin/praia + lib/praia/dylibs/*.dylib.
        run: |
          mkdir -p dist/lib/praia/dylibs
          dylibbundler -od -b -x dist/praia \
            -d dist/lib/praia/dylibs/ \
            -p '@executable_path/../lib/praia/dylibs/'
          echo "--- post-bundle otool -L ---"
          otool -L dist/praia
          if otool -L dist/praia | grep -q '/opt/homebrew\|/usr/local/Cellar'; then
            echo "ERROR: binary still references homebrew paths after bundling" >&2
            exit 1
          fi

      - name: Bundle shared libs (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        # Linux equivalent of the macOS bundling. Copy every non-system shared
        # library the binary links against into dist/lib/praia/lib/, then patchelf
        # the binary's RPATH so it looks there first. Skip glibc/libstdc++/libgcc
        # — those must match the system kernel and aren't safe to ship.
        # RPATH is "$ORIGIN/../lib/praia/lib" so it resolves correctly *after*
        # install (binary at /usr/local/bin/praia, libs at /usr/local/lib/praia/lib).
        # In the CI staged layout (dist/praia + dist/lib/...) ldd will report
        # "not found" — that's expected; we verify via patchelf --print-rpath.
        run: |
          mkdir -p dist/lib/praia/lib
          ldd dist/praia | awk '/=>/ && $3 ~ /^\// { print $3 }' | while read lib; do
            case "$(basename "$lib")" in
              libc.so.*|libm.so.*|libpthread.so.*|libdl.so.*|librt.so.*|\
              libstdc++.so.*|libgcc_s.so.*|ld-linux-*.so.*|libnsl.so.*|\
              libresolv.so.*|libutil.so.*|libcrypt.so.*)
                ;; # system — leave alone
              *)
                cp -L "$lib" dist/lib/praia/lib/
                ;;
            esac
          done
          patchelf --set-rpath '$ORIGIN/../lib/praia/lib' dist/praia
          # Bundled .so files set RPATH to $ORIGIN so transitive deps resolve
          # to the same bundle dir (e.g. libssl finds libcrypto next to it).
          for so in dist/lib/praia/lib/*.so*; do
            [ -f "$so" ] || continue
            patchelf --set-rpath '$ORIGIN' "$so" 2>/dev/null || true
          done
          echo "--- bundled libs ---"
          ls -la dist/lib/praia/lib/
          echo "--- binary RPATH ---"
          patchelf --print-rpath dist/praia
          if [ "$(patchelf --print-rpath dist/praia)" != '$ORIGIN/../lib/praia/lib' ]; then
            echo "ERROR: RPATH was not set correctly on the binary" >&2
            exit 1
          fi

      - name: Import codesign certificate (macOS)
        if: startsWith(matrix.os, 'macos')
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT=$RUNNER_TEMP/codesign.p12
          KEYCHAIN=$RUNNER_TEMP/build.keychain-db
          # Decode the base64-encoded .p12 into a real file. `-o` is
          # macOS's base64 syntax (matches GNU coreutils' `-d` behavior
          # for this case).
          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o "$CERT"
          # Throwaway keychain so we don't pollute the runner's default
          # one (and so a leak doesn't expose this cert beyond the job).
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT" -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          # Allow codesign to use the imported key without prompting.
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # Make the throwaway keychain visible to codesign.
          security list-keychain -d user -s "$KEYCHAIN" login.keychain
          # Sanity check — should list the Developer ID Application identity.
          security find-identity -v -p codesigning "$KEYCHAIN"
          rm -f "$CERT"

      - name: Sign binary + dylibs (macOS)
        if: startsWith(matrix.os, 'macos')
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          # praia's loadNative() dlopens user-built plugin .dylibs that
          # we obviously can't sign in advance. Hardened runtime blocks
          # those by default, so the main binary needs the
          # disable-library-validation entitlement. Bundled dylibs are
          # already signed by us so they stay under the default policy.
          ENT=$RUNNER_TEMP/entitlements.plist
          cat > "$ENT" <<'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
          </dict>
          </plist>
          PLIST_EOF

          # Sign every bundled Mach-O first, then the main binary on top.
          # Notarization rejects any unsigned Mach-O inside the bundle,
          # so we walk the whole tree via `find` (dylibbundler keeps
          # output flat today but glob-fragility isn't worth the risk).
          #
          # --options=runtime turns on the hardened-runtime flag that
          # notarization requires.
          # --timestamp embeds an RFC3161 timestamp from Apple's TSA so
          # signatures remain verifiable after the cert expires.
          # --force overwrites any existing ad-hoc signature.
          find dist -type f -name '*.dylib' -print0 \
            | while IFS= read -r -d '' f; do
                codesign --force --options=runtime --timestamp \
                  --sign "$MACOS_SIGNING_IDENTITY" "$f"
              done
          codesign --force --options=runtime --timestamp \
            --entitlements "$ENT" \
            --sign "$MACOS_SIGNING_IDENTITY" dist/praia
          codesign --verify --verbose=2 dist/praia
          # Confirm the binary advertises the hardened runtime flag.
          codesign -d --verbose=4 dist/praia 2>&1 | grep -q 'flags=.*runtime' \
            || { echo "ERROR: hardened runtime not set on dist/praia"; exit 1; }
          # And that the library-validation entitlement is present.
          codesign -d --entitlements - dist/praia 2>&1 \
            | grep -q 'disable-library-validation' \
            || { echo "ERROR: entitlement missing on dist/praia"; exit 1; }

      - name: Notarize bundle (macOS)
        if: startsWith(matrix.os, 'macos')
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          # notarytool needs the .p8 on disk.
          KEY=$RUNNER_TEMP/AuthKey.p8
          echo -n "$APPLE_API_KEY" | base64 --decode -o "$KEY"
          # `ditto -c -k --keepParent` produces the zip layout notarytool
          # expects (it preserves macOS metadata that plain `zip` mangles).
          ZIP=$RUNNER_TEMP/notarize.zip
          ditto -c -k --keepParent dist "$ZIP"
          # --wait blocks until Apple's notary service finishes; typical
          # turnaround is under a minute but can stretch to several.
          xcrun notarytool submit "$ZIP" \
            --key "$KEY" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          # Standalone Mach-O binaries can't be stapled (stapler accepts
          # only .app/.pkg/.dmg). Gatekeeper does an online ticket
          # lookup on first run instead — which is fast precisely
          # because notarization registered the ticket with Apple.
          rm -f "$KEY" "$ZIP"

      - name: Package tarball
        run: |
          cd dist && tar czf ../praia-${{ matrix.target }}.tar.gz *

      - name: Install-smoke test
        # Extract the tarball, install to /usr/local (the path baked into
        # PRAIA_LIBDIR), and exercise every shipped surface: the binary,
        # stdlib grain resolution, the sand wrapper, and the plugin
        # headers + dlopen path. Catches breakage in the staging step
        # (missing files, wrong layout, broken wrapper) *before* the
        # artifact reaches a user. We install rather than running
        # in-place because the release binary's grain resolver only
        # checks the baked LIBDIR — the same path users follow when
        # they extract a tarball with `sudo tar -C /usr/local -xzf …`.
        run: |
          set -euo pipefail
          SMOKE=$(mktemp -d -t praia-smoke.XXXXXX)
          tar xzf praia-${{ matrix.target }}.tar.gz -C "$SMOKE"

          echo "── installing to /usr/local ──"
          sudo install -d /usr/local/bin /usr/local/lib/praia
          sudo install -m 0755 "$SMOKE/praia" /usr/local/bin/praia
          sudo install -m 0755 "$SMOKE/sand"  /usr/local/bin/sand
          sudo cp -R "$SMOKE/lib/praia/." /usr/local/lib/praia/
          cd "$SMOKE"

          echo "── 1/4: praia binary ──"
          /usr/local/bin/praia -v | grep -i "praia"

          echo "── 2/4: stdlib grain resolution ──"
          cat > smoke.praia <<'PRAIA_EOF'
          use "testing"
          testing.test("smoke", lam{ in
              testing.assertEqual(1 + 1, 2, nil)
          })
          testing.done()
          PRAIA_EOF
          /usr/local/bin/praia smoke.praia | grep "1 passed"

          echo "── 3/4: sand wrapper ──"
          /usr/local/bin/sand --version | grep -i "sand"

          echo "── 4/4: plugin headers + dlopen ──"
          INC=$(/usr/local/bin/praia --include-path)
          test -f "$INC/praia_plugin.h" || { echo "missing praia_plugin.h at $INC"; exit 1; }
          # Inline a minimal plugin that exercises Value + PraiaMap.
          cat > smoke_plugin.cpp <<'CPP_EOF'
          #include "praia_plugin.h"
          extern "C" void praia_register(PraiaMap* module) {
              module->entries[Value(std::string("ok"))] = Value(std::string("yes"));
          }
          CPP_EOF
          case "$(uname -s)" in
            Darwin) EXT=dylib; LDF='-undefined dynamic_lookup' ;;
            *)      EXT=so;    LDF='' ;;
          esac
          # Mirror the in-tree `make plugin` invocation so the smoke
          # test compiles plugins the same way we tell users to.
          c++ -std=c++20 -Wno-deprecated-declarations \
              -D_XOPEN_SOURCE=600 -D_DARWIN_C_SOURCE \
              -shared -fPIC -I"$INC" $LDF \
              -o "smoke_plugin.$EXT" smoke_plugin.cpp
          cat > plugin_smoke.praia <<'PRAIA_EOF'
          let p = loadNative("./smoke_plugin")
          if (p.ok != "yes") { print("plugin load failed:", p); sys.exit(1) }
          print("plugin ok")
          PRAIA_EOF
          /usr/local/bin/praia plugin_smoke.praia | grep "plugin ok"

          echo "── install-smoke test passed ──"

      - name: SHA-256 sidecar
        # One-line file per tarball in the standard `sha256sum -c` format.
        # Aggregated into SHA256SUMS by the release job below.
        run: |
          if command -v sha256sum >/dev/null; then
            sha256sum praia-${{ matrix.target }}.tar.gz > praia-${{ matrix.target }}.tar.gz.sha256
          else
            # macOS shipped shasum predates sha256sum.
            shasum -a 256 praia-${{ matrix.target }}.tar.gz > praia-${{ matrix.target }}.tar.gz.sha256
          fi
          cat praia-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: praia-${{ matrix.target }}
          path: |
            praia-${{ matrix.target }}.tar.gz
            praia-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Aggregate SHA256SUMS
        # Combine each per-platform sidecar into one SHA256SUMS file that
        # downloaders can verify with `sha256sum -c SHA256SUMS`. Strips
        # the artifact subdirectory prefix that download-artifact adds
        # so the paths match the files attached to the release.
        run: |
          set -euo pipefail
          cd artifacts
          cat */*.tar.gz.sha256 | sed 's| .*/| |' > ../SHA256SUMS
          cd ..
          echo "--- SHA256SUMS ---"
          cat SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            SHA256SUMS
          generate_release_notes: true
